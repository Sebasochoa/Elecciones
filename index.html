<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados Presidenciales Perú 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #e8c84a;
    --accent2: #4a9eff;
    --text: #e8eaf0;
    --muted: #6b7a99;
    --red: #ff4d6d;
    --green: #4ade80;
    --gold: #fbbf24;
    --silver: #94a3b8;
    --bronze: #c0783c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 20px 60px;
    position: relative;
    z-index: 1;
  }
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 36px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header-left h1 span { color: var(--accent); }
  .header-left p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'DM Mono', monospace;
  }
  .update-badge {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  .live-dot {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--green);
    font-weight: 500;
    letter-spacing: 0.05em;
  }
  .live-dot::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(74,222,128,0.4);
    animation: pulse 2s infinite;
  }
  .live-dot.error { color: var(--red); }
  .live-dot.error::before { background: var(--red); animation: none; box-shadow: none; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    70%  { box-shadow: 0 0 0 8px rgba(74,222,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
  }
  #last-update {
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  #onpe-update {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent2);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .refresh-btn:hover { background: var(--accent2); color: #000; }
  .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .totales-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .stat-card.blue::after  { background: var(--accent2); }
  .stat-card.muted::after { background: var(--muted); }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: 'DM Mono', monospace;
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .stat-card.blue .stat-value  { color: var(--accent2); }
  .stat-card.muted .stat-value { color: var(--silver); }
  .stat-sub {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-top: 3px;
  }
  .progress-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 28px;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
  }
  .progress-pct {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
  }
  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 3px;
    transition: width 1s ease;
  }
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .candidates-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
  }
  .candidate-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }
  .candidate-row:hover { border-color: rgba(74,158,255,0.3); transform: translateX(2px); }
  .candidate-row.rank-1 {
    border-color: rgba(251,191,36,0.4);
    background: linear-gradient(135deg, #111827, #16201a);
  }
  .candidate-row.rank-1::before,
  .candidate-row.rank-2::before,
  .candidate-row.rank-3::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .candidate-row.rank-1::before { background: var(--gold); }
  .candidate-row.rank-2::before { background: var(--silver); }
  .candidate-row.rank-3::before { background: var(--bronze); }
  .rank-num {
    font-size: 13px;
    font-weight: 800;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-align: center;
  }
  .rank-1 .rank-num { color: var(--gold); }
  .rank-2 .rank-num { color: var(--silver); }
  .rank-3 .rank-num { color: var(--bronze); }
  .candidate-info {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }
  .candidate-name {
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.2px;
  }
  .candidate-party {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 2px;
  }
  .bar-track {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
    background: var(--accent2);
  }
  .rank-1 .bar-fill { background: linear-gradient(90deg, var(--gold), #f59e0b); }
  .rank-2 .bar-fill { background: var(--silver); }
  .rank-3 .bar-fill { background: var(--bronze); }
  .bar-pct-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    width: 42px;
    text-align: right;
  }
  .candidate-stats {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: flex-end;
  }
  .votes-pct {
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    line-height: 1;
  }
  .rank-1 .votes-pct { color: var(--gold); }
  .votes-count {
    font-size: 12px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    white-space: nowrap;
  }
  .distances-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .distance-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .distance-label {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    flex: 1;
    line-height: 1.5;
  }
  .distance-label strong { color: var(--text); font-weight: 700; }
  .distance-value {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .dist-pct {
    font-size: 18px;
    font-weight: 800;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
  }
  .dist-votes {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .loading-placeholder { height: 80px; border-radius: 10px; }
  .error-banner {
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.3);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 12px;
    color: var(--red);
    font-family: 'DM Mono', monospace;
    margin-bottom: 20px;
    display: none;
  }
  footer {
    text-align: center;
    margin-top: 48px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    border-top: 1px solid var(--border);
    padding-top: 20px;
    line-height: 1.8;
  }
  footer a { color: var(--accent2); text-decoration: none; }
  @media (max-width: 600px) {
    .totales-strip { grid-template-columns: 1fr 1fr; }
    .totales-strip .stat-card:last-child { grid-column: 1 / -1; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1>Elecciones Perú <span>2026</span></h1>
      <p>Fórmula Presidencial · Resultados ONPE oficiales</p>
    </div>
    <div class="update-badge">
      <div class="live-dot" id="live-status">CARGANDO</div>
      <div id="last-update">—</div>
      <div id="onpe-update"></div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">↺ Actualizar</button>
    </div>
  </header>

  <div id="error-banner" class="error-banner"></div>

  <div class="totales-strip" id="totales-strip">
    <div class="stat-card"><div class="stat-label">Actas contabilizadas</div><div class="skeleton" style="height:28px;width:80px;margin-top:4px"></div></div>
    <div class="stat-card blue"><div class="stat-label">Total de actas</div><div class="skeleton" style="height:28px;width:70px;margin-top:4px"></div></div>
    <div class="stat-card muted"><div class="stat-label">Actas pendientes</div><div class="skeleton" style="height:28px;width:50px;margin-top:4px"></div></div>
  </div>

  <div class="progress-container">
    <div class="progress-header">
      <span class="progress-label">Avance del conteo</span>
      <span class="progress-pct" id="progress-pct">—%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="section-title">Candidatos</div>
  <div class="candidates-list" id="candidates-list">
    <div class="loading-placeholder skeleton"></div>
    <div class="loading-placeholder skeleton" style="height:70px;margin-top:4px"></div>
    <div class="loading-placeholder skeleton" style="height:70px;margin-top:4px"></div>
  </div>

  <div class="section-title">Distancias clave</div>
  <div class="distances-list" id="distances-list">
    <div class="loading-placeholder skeleton" style="height:56px"></div>
    <div class="loading-placeholder skeleton" style="height:56px;margin-top:4px"></div>
  </div>

  <footer>
    Fuente: <a href="https://resultadoelectoral.onpe.gob.pe" target="_blank">resultadoelectoral.onpe.gob.pe</a><br>
    Datos actualizados por GitHub Actions cada 5 minutos
  </footer>

</div>
<script>
  const fmtNum = n => Number(n).toLocaleString('es-PE');
  const fmtPct = n => Number(n).toFixed(3) + '%';

  // Lee los JSON locales que GitHub Actions actualiza
  async function loadData() {
    const btn = document.getElementById('refresh-btn');
    const status = document.getElementById('live-status');
    btn.disabled = true;
    status.className = 'live-dot';
    status.textContent = 'CARGANDO';
    document.getElementById('error-banner').style.display = 'none';

    try {
      // Cache-bust para que no sirva versión vieja
      const ts = Date.now();
      const [resPart, resTot, resMeta] = await Promise.all([
        fetch(`data/participantes.json?t=${ts}`),
        fetch(`data/totales.json?t=${ts}`),
        fetch(`data/meta.json?t=${ts}`)
      ]);

      if (!resPart.ok || !resTot.ok) throw new Error('No se pudieron cargar los datos.');

      const [participantes, totales, meta] = await Promise.all([
        resPart.json(),
        resTot.json(),
        resMeta.json().catch(() => ({}))
      ]);

      renderTotales(totales);
      renderCandidatos(participantes);
      renderDistancias(participantes);

      status.className = 'live-dot';
      status.textContent = 'DATOS OK';

      document.getElementById('last-update').textContent =
        'Página: ' + new Date().toLocaleTimeString('es-PE');

      if (meta.updatedAt) {
        const d = new Date(meta.updatedAt);
        document.getElementById('onpe-update').textContent =
          'ONPE: ' + d.toLocaleTimeString('es-PE');
      }

    } catch (err) {
      console.error(err);
      const banner = document.getElementById('error-banner');
      banner.style.display = 'block';
      banner.textContent = '⚠ ' + err.message + ' Asegúrate de que GitHub Actions haya corrido al menos una vez.';
      status.className = 'live-dot error';
      status.textContent = 'ERROR';
    } finally {
      btn.disabled = false;
    }
  }

  /* ── helpers para parsear la respuesta de ONPE ── */
  function getCandidatos(data) {
    let lista = Array.isArray(data)
      ? data
      : (data.participantes ?? data.lista ?? data.candidatos ?? data.data ?? []);
    return lista.slice().sort((a, b) => getVotos(b) - getVotos(a));
  }
  const getVotos  = c => c.totalVotos ?? c.votos ?? c.cantidadVotos ?? 0;
  const getPct    = c => c.porcentaje ?? c.pct ?? c.porcentajeVotos ?? null;
  const getNombre = c => c.nombreCompleto ?? c.nombre ?? c.candidato ?? c.nombreCandidato ?? '—';
  const getPartido= c => c.nombreOrganizacion ?? c.partido ?? c.organizacion ?? c.agrupacion ?? '';

  function renderTotales(data) {
    const pct          = data.porcentajeActasContabilizadas ?? data.pctActasContabilizadas ?? data.porcentaje ?? null;
    const totalActas   = data.totalActas ?? data.cantidadActasTotal ?? null;
    const contabilizadas = data.actasContabilizadas ?? data.cantidadActasContabilizadas ?? null;
    const pendientes   = data.actasPendientes ?? data.cantidadActasPendientes ?? null;
    const envioJEE     = data.actasParaEnvioJEE ?? data.cantidadActasParaEnvioJEE ?? null;
    const pctFinal     = pct ?? (contabilizadas && totalActas ? contabilizadas / totalActas * 100 : null);

    document.getElementById('totales-strip').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Actas contabilizadas</div>
        <div class="stat-value">${pctFinal !== null ? fmtPct(pctFinal) : '—'}</div>
        <div class="stat-sub">${contabilizadas !== null ? fmtNum(contabilizadas) + ' actas' : ''}</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Total de actas</div>
        <div class="stat-value">${totalActas !== null ? fmtNum(totalActas) : '—'}</div>
        ${envioJEE !== null ? `<div class="stat-sub">Para JEE: ${fmtNum(envioJEE)}</div>` : ''}
      </div>
      <div class="stat-card muted">
        <div class="stat-label">Pendientes</div>
        <div class="stat-value">${pendientes !== null ? fmtNum(pendientes) : '—'}</div>
        <div class="stat-sub">${pendientes !== null && totalActas !== null
          ? fmtPct(pendientes / totalActas * 100) + ' del total' : ''}</div>
      </div>
    `;

    if (pctFinal !== null) {
      document.getElementById('progress-pct').textContent = fmtPct(pctFinal);
      document.getElementById('progress-fill').style.width = Math.min(pctFinal, 100) + '%';
    }
  }

  function renderCandidatos(data) {
    const lista = getCandidatos(data);
    if (!lista.length) {
      document.getElementById('candidates-list').innerHTML =
        '<p style="color:var(--muted);font-size:13px;padding:12px">Sin datos aún.</p>';
      return;
    }
    const maxVotos = getVotos(lista[0]);

    document.getElementById('candidates-list').innerHTML = lista.map((c, i) => {
      const rank      = i + 1;
      const votos     = getVotos(c);
      const pct       = getPct(c);
      const barWidth  = maxVotos ? (votos / maxVotos * 100).toFixed(1) : 0;
      const rankClass = rank <= 3 ? `rank-${rank}` : '';

      return `
        <div class="candidate-row ${rankClass}">
          <div class="rank-num">${rank}</div>
          <div class="candidate-info">
            <div class="candidate-name">${getNombre(c)}</div>
            <div class="candidate-party">${getPartido(c)}</div>
            <div class="bar-wrap">
              <div class="bar-track">
                <div class="bar-fill" style="width:${barWidth}%"></div>
              </div>
              <div class="bar-pct-label">${barWidth}%</div>
            </div>
          </div>
          <div class="candidate-stats">
            <div class="votes-pct">${pct !== null ? fmtPct(pct) : '—'}</div>
            <div class="votes-count">${fmtNum(votos)} votos</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function shortName(nombre) {
    const parts = nombre.trim().split(' ');
    return parts.length >= 2 ? parts[0] + ' ' + parts[1] : nombre;
  }

  function renderDistancias(data) {
    const lista = getCandidatos(data);
    if (lista.length < 2) { document.getElementById('distances-list').innerHTML = ''; return; }

    const rows = [];
    for (let i = 0; i < Math.min(lista.length - 1, 3); i++) {
      const a = lista[i], b = lista[i + 1];
      const pa = getPct(a), pb = getPct(b);
      const diffV = getVotos(a) - getVotos(b);
      const diffP = pa !== null && pb !== null ? pa - pb : null;
      rows.push({
        label: `<strong>${shortName(getNombre(a))}</strong> vs <strong>${shortName(getNombre(b))}</strong>`,
        tag: `${i+1}° vs ${i+2}°`,
        diffV, diffP
      });
    }

    document.getElementById('distances-list').innerHTML = rows.map(r => `
      <div class="distance-row">
        <div class="distance-label">
          <span style="color:var(--muted);font-size:10px;display:block;margin-bottom:3px">${r.tag}</span>
          ${r.label}
        </div>
        <div class="distance-value">
          <div class="dist-pct">${r.diffP !== null ? '+' + Math.abs(r.diffP).toFixed(3) + 'pp' : '—'}</div>
          <div class="dist-votes">${fmtNum(r.diffV)} votos</div>
        </div>
      </div>
    `).join('');
  }

  loadData();
  // Re-chequea cada 5 minutos (en sintonía con el workflow)
  setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
