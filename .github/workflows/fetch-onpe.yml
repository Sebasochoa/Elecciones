name: Fetch ONPE Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Fetch data
        run: |
          python3 << 'PYEOF'
          import requests
          import json
          import time
          import warnings
          warnings.filterwarnings('ignore')

          ENDPOINTS = {
              "participantes": "https://resultadoelectoral.onpe.gob.pe/presentacion-backend/resumen-general/participantes?idEleccion=10&tipoFiltro=eleccion",
              "totales": "https://resultadoelectoral.onpe.gob.pe/presentacion-backend/resumen-general/totales?idEleccion=10&tipoFiltro=eleccion",
          }

          def fetch_with_session():
              session = requests.Session()
              session.headers.update({
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
                  "Accept-Language": "es-PE,es;q=0.9",
              })
              # Obtener cookies visitando la página principal
              try:
                  session.get("https://resultadoelectoral.onpe.gob.pe/main/resumen", timeout=15, verify=False)
              except:
                  pass
              time.sleep(1)
              session.headers.update({
                  "Accept": "application/json, text/plain, */*",
                  "Referer": "https://resultadoelectoral.onpe.gob.pe/main/resumen",
                  "Origin": "https://resultadoelectoral.onpe.gob.pe",
                  "sec-fetch-dest": "empty",
                  "sec-fetch-mode": "cors",
                  "sec-fetch-site": "same-origin",
              })
              return session

          for name, url in ENDPOINTS.items():
              ok = False
              for attempt in range(5):
                  try:
                      session = fetch_with_session()
                      r = session.get(url, timeout=15, verify=False)
                      preview = r.content[:80]
                      print(f"  {name} attempt {attempt+1}: status={r.status_code} bytes={len(r.content)} preview={preview}")
                      # Verificar que empiece con { (JSON) no con < (HTML)
                      stripped = r.content.lstrip()
                      if not stripped.startswith(b'{'):
                          raise ValueError(f"Respuesta no es JSON: {preview}")
                      data = r.json()
                      assert data.get("success") == True
                      with open(f"data/{name}.json", "w", encoding="utf-8") as f:
                          json.dump(data, f, ensure_ascii=False)
                      print(f"✓ {name} OK en intento {attempt+1}")
                      ok = True
                      break
                  except Exception as e:
                      print(f"  intento {attempt+1} falló: {e}")
                      time.sleep(5 * (attempt + 1))  # backoff: 5s, 10s, 15s, 20s, 25s

              if not ok:
                  raise SystemExit(f"✗ {name} falló todos los intentos")

          print("Todos los endpoints OK")
          PYEOF

      - name: Add timestamp
        run: |
          echo "{\"updatedAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/meta.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update ONPE data $(date -u +%H:%M UTC)"
          git push
