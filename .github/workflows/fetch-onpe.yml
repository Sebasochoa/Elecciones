name: Fetch ONPE Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Fetch data
        run: |
          python3 << 'PYEOF'
          import requests
          import json
          import time

          session = requests.Session()
          session.headers.update({
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Accept-Language": "es-PE,es;q=0.9",
          })

          # Paso 1: visitar la página principal para obtener cookies
          print("Obteniendo cookies...")
          try:
              session.get("https://resultadoelectoral.onpe.gob.pe/main/resumen", timeout=15, verify=False)
              print(f"  Cookies: {dict(session.cookies)}")
          except Exception as e:
              print(f"  Advertencia al obtener cookies: {e}")

          time.sleep(2)

          # Paso 2: hacer los requests a la API con las cookies obtenidas
          session.headers.update({
              "Accept": "application/json, text/plain, */*",
              "Referer": "https://resultadoelectoral.onpe.gob.pe/main/resumen",
              "Origin": "https://resultadoelectoral.onpe.gob.pe",
              "sec-fetch-dest": "empty",
              "sec-fetch-mode": "cors",
              "sec-fetch-site": "same-origin",
          })

          ENDPOINTS = {
              "participantes": "https://resultadoelectoral.onpe.gob.pe/presentacion-backend/resumen-general/participantes?idEleccion=10&tipoFiltro=eleccion",
              "totales": "https://resultadoelectoral.onpe.gob.pe/presentacion-backend/resumen-general/totales?idEleccion=10&tipoFiltro=eleccion",
          }

          for name, url in ENDPOINTS.items():
              ok = False
              for attempt in range(3):
                  try:
                      r = session.get(url, timeout=15, verify=False)
                      print(f"  {name} status: {r.status_code}, bytes: {len(r.content)}")
                      data = r.json()
                      assert data.get("success") == True, f"success!=True: {str(data)[:100]}"
                      with open(f"data/{name}.json", "w") as f:
                          json.dump(data, f)
                      print(f"✓ {name} OK")
                      ok = True
                      break
                  except Exception as e:
                      print(f"  intento {attempt+1} falló: {e}")
                      time.sleep(3)
              if not ok:
                  raise SystemExit(f"✗ {name} falló todos los intentos")

          print("Todos los endpoints OK")
          PYEOF

      - name: Add timestamp
        run: |
          echo "{\"updatedAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/meta.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update ONPE data $(date -u +%H:%M UTC)"
          git push
