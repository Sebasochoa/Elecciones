name: Fetch ONPE Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch participantes
        run: |
          # Intentar con múltiples proxies/métodos hasta que uno funcione
          URL="https://resultadoelectoral.onpe.gob.pe/presentacion-backend/resumen-general/participantes?idEleccion=10&tipoFiltro=eleccion"
          
          # Intento 1: directo con todos los headers
          curl -s -L --max-time 15 \
            -H "Accept: application/json, text/plain, */*" \
            -H "Accept-Language: es-PE,es;q=0.9,en;q=0.8" \
            -H "Cache-Control: no-cache" \
            -H "Connection: keep-alive" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Referer: https://resultadoelectoral.onpe.gob.pe/" \
            -H "sec-ch-ua: \"Chromium\";v=\"124\"" \
            -H "sec-ch-ua-mobile: ?0" \
            -H "sec-fetch-dest: empty" \
            -H "sec-fetch-mode: cors" \
            -H "sec-fetch-site: same-origin" \
            "$URL" -o data/participantes.json
          
          python3 -c "import json; json.load(open('data/participantes.json'))" 2>/dev/null && echo "OK directo" && exit 0
          
          # Intento 2: via allorigins proxy
          echo "Intentando via proxy..."
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$URL'))")
          curl -s -L --max-time 15 \
            "https://api.allorigins.win/get?url=${ENCODED}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); open('data/participantes.json','w').write(d['contents'])"
          
          python3 -c "import json; json.load(open('data/participantes.json'))" 2>/dev/null && echo "OK via proxy" && exit 0
          
          echo "Todos los intentos fallaron"
          head -3 data/participantes.json
          exit 1

      - name: Fetch totales
        run: |
          URL="https://resultadoelectoral.onpe.gob.pe/presentacion-backend/resumen-general/totales?idEleccion=10&tipoFiltro=eleccion"
          
          curl -s -L --max-time 15 \
            -H "Accept: application/json, text/plain, */*" \
            -H "Accept-Language: es-PE,es;q=0.9,en;q=0.8" \
            -H "Cache-Control: no-cache" \
            -H "Connection: keep-alive" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Referer: https://resultadoelectoral.onpe.gob.pe/" \
            -H "sec-fetch-dest: empty" \
            -H "sec-fetch-mode: cors" \
            -H "sec-fetch-site: same-origin" \
            "$URL" -o data/totales.json
          
          python3 -c "import json; json.load(open('data/totales.json'))" 2>/dev/null && echo "OK directo" && exit 0
          
          echo "Intentando via proxy..."
          ENCODED=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$URL'))")
          curl -s -L --max-time 15 \
            "https://api.allorigins.win/get?url=${ENCODED}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); open('data/totales.json','w').write(d['contents'])"
          
          python3 -c "import json; json.load(open('data/totales.json'))" 2>/dev/null && echo "OK via proxy" && exit 0
          
          echo "Todos los intentos fallaron"
          exit 1

      - name: Add timestamp
        run: |
          echo "{\"updatedAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/meta.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update ONPE data $(date -u +%H:%M UTC)"
          git push
